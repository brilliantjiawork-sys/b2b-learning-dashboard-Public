    .toast{position:fixed;right:20px;bottom:82px;z-index:40;background:#2f3b43;color:#fff;padding:10px 14px;border-radius:12px;opacity:0;transform:translateY(10px);pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:none}

  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">OVERSEAS B2B CONTENT MARKETING</p>
        <h1>8天学习、输出与面试看板</h1>
        <p>目标不是成为更熟练的发布执行者，而是建立对海外买家、采购决策、内容价值与转化链路的判断力。</p>
      </div>
      <div class="hero-side">
        <div class="metric"><b>6.5h</b><small>每日学习含输出</small></div>
        <div class="metric"><b>50m</b><small>与豆包模拟面试</small></div>
        <div class="metric"><b>40m</b><small>面试复盘</small></div>
        <div class="metric"><b id="heroProgress">0%</b><small>当天完成度</small></div>
      </div>
    </header>

    <div class="tabs-wrap"><nav class="tabs" id="tabs" aria-label="选择日期"></nav></div>
    <section id="app"></section>
    <div class="toast" id="toast"></div>
  </main>

    function ds(){if(!state[active])state[active]={tasks:{},learnAnswers:[],interviewAnswers:[]};return state[active]}
    function save(){localStorage.setItem(STORAGE,JSON.stringify(state));localStorage.setItem(STORAGE+'-active',active);const n=document.querySelector('.save-note');if(n){n.textContent='已自动保存到本机';setTimeout(()=>n.textContent='数据仅保存在本机浏览器',1200)}}
    function esc(s=''){return String(s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]))}
    function tabs(){document.getElementById('tabs').innerHTML=dayData.map((d,i)=>`<button class="tab ${i===active?'active':''}" onclick="switchDay(${i})">${d.date}</button>`).join('')}

    function taskDesc(d,id){if(id==='output')return '回答下方“学习结束考察”的全部问题，确保今天的海外B2B、YouTube / SEO与平台任务都有对应输出。';if(id==='interview')return d.interviewOutput;if(id==='review')return `对照“${d.criteria}”复盘豆包追问：记录最薄弱的一处，重答一道题，并写下明天只改进的一件事。`;return d.tasks[id]}
    function render(){

    function field(id,label,hint,value=''){return `<div class="field"><label>${label}</label><textarea data-field="${id}" placeholder="${hint}">${esc(value||'')}</textarea></div>`}
    function tidyNumber(n){const x=Math.round(Number(n)*100)/100;return Number.isInteger(x)?String(x):String(x).replace(/0+$/,'').replace(/\.$/,'')}
    function plannedText(hours){const minutes=Math.round(hours*60);return minutes%60===0?`${minutes/60}小时`:minutes>60?`${tidyNumber(hours)}小时`:`${minutes}分钟`}
    function deviationInfo(actual,planned){if(actual===''||actual===undefined||actual===null)return{text:'计划偏差 —',cls:''};const diff=Number(actual)-planned;if(Math.abs(diff)<.005)return{text:'计划偏差 0h',cls:''};return{text:`计划偏差 ${diff>0?'+':'−'}${tidyNumber(Math.abs(diff))}h`,cls:diff>0?'over':'under'}}
    function renderTasks(){const d=dayData[active],s=ds();document.getElementById('taskList').innerHTML=blocks.map(b=>{const t=s.tasks[b.id]||{},name=b.id==='platform'?d.platformLabel:b.name,dev=deviationInfo(t.actual,b.planned);return `<div class="task"><input type="checkbox" data-done="${b.id}" ${t.done?'checked':''}><div><div class="task-name">${name}</div><div class="task-meta">${b.time} · 计划${plannedText(b.planned)}</div><div class="task-desc">${taskDesc(d,b.id)}</div></div><div class="time-entry"><input class="hours" type="number" min="0" max="8" step="0.1" data-hours="${b.id}" value="${t.actual??''}" placeholder="实际h" aria-label="${name}实际用时"><div class="task-deviation ${dev.cls}" data-deviation="${b.id}">${dev.text}</div></div></div>`}).join('')}
    function renderQuestions(type,arr){const s=ds(),key=type==='learn'?'learnAnswers':'interviewAnswers',labels=type==='learn'?['海外B2B核心','YouTube / SEO',dayData[active].platformLabel,'整合判断']:[];document.getElementById(type+'Questions').innerHTML=arr.map((q,i)=>`<div class="question"><div class="q-title"><span class="q-no">${i+1}</span><span>${labels[i]?`<small class="q-area">${labels[i]}</small>`:''}${q}</span></div><div class="answer-tools"><span>建议结构：判断 → 依据 → 风险/边界 → 下一步</span><button class="voice" data-voice="${type}-${i}" onclick="startVoice('${type}',${i},this)">🎙 语音回答</button></div><textarea class="answer" data-answer="${type}-${i}" placeholder="在这里输入，或点击语音回答…">${esc((s[key]||[])[i]||'')}</textarea></div>`).join('')}
    function bindFields(){document.querySelectorAll('[data-done]').forEach(el=>el.onchange=()=>{const t=ds().tasks[el.dataset.done]||{};t.done=el.checked;ds().tasks[el.dataset.done]=t;save();updateDashboard()});document.querySelectorAll('[data-hours]').forEach(el=>el.oninput=()=>{const t=ds().tasks[el.dataset.hours]||{};t.actual=el.value;ds().tasks[el.dataset.hours]=t;save();updateDashboard()});document.querySelectorAll('[data-field]').forEach(el=>el.oninput=()=>{ds()[el.dataset.field]=el.value;save()});document.querySelectorAll('[data-answer]').forEach(el=>el.oninput=()=>{const [type,i]=el.dataset.answer.split('-'),key=type==='learn'?'learnAnswers':'interviewAnswers';if(!ds()[key])ds()[key]=[];ds()[key][Number(i)]=el.value;save()})}
    function setChartMode(mode){chartMode=mode;render()}

    function updateDashboard(){const s=ds();let done=0;blocks.forEach(b=>{if((s.tasks[b.id]||{}).done)done++});const pct=Math.round(done/blocks.length*100);document.getElementById('progressBar').style.width=pct+'%';document.getElementById('progressText').textContent=pct+'%';document.getElementById('heroProgress').textContent=pct+'%';updateTaskDeviations();updateChart();updateStats()}

    function updateChart(){const vals=values(),sum=vals.reduce((a,b)=>a+b,0),colors=blocks.map(b=>b.color);let cur=0,grad=[];vals.forEach((v,i)=>{const start=sum?cur/sum*100:0;cur+=v;const end=sum?cur/sum*100:0;grad.push(`${colors[i]} ${start}% ${end}%`)});document.getElementById('donut').style.background=sum?`conic-gradient(${grad.join(',')})`:'#ece8e1';document.getElementById('chartTotal').textContent=tidyNumber(sum)+'h';document.getElementById('chartCaption').textContent=chartMode==='planned'?'计划时段':'实际记录';document.getElementById('legend').innerHTML=blocks.map((b,i)=>{const label=b.id==='platform'?dayData[active].platformLabel:b.name,pct=sum?Math.round(vals[i]/sum*100):0,value=chartMode==='planned'?plannedText(vals[i]):`${tidyNumber(vals[i])}h`;return `<div class="legend-row"><i class="dot" style="background:${colors[i]}"></i><span>${label}</span><b>${value} · ${pct}%</b></div>`}).join('')}
    function updateStats(){const s=ds();let actual=0,filled=0,totalDiff=0;blocks.forEach(b=>{const v=(s.tasks[b.id]||{}).actual;if(v!==''&&v!==undefined&&v!==null){actual+=Number(v);totalDiff+=Number(v)-b.planned;filled++}});const diffText=filled?(totalDiff>0?'+':totalDiff<0?'−':'')+tidyNumber(Math.abs(totalDiff))+'h':'—';document.getElementById('stats').innerHTML=`<div class="stat"><b>${tidyNumber(actual)}h</b><small>实际总时长</small></div><div class="stat"><b>${diffText}</b><small>各任务偏差合计</small></div><div class="stat"><b>${filled}/${blocks.length}</b><small>已填时间块</small></div>`}
    function startVoice(type,index,btn){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){showToast('当前浏览器不支持网页语音识别，请使用系统听写');return}if(recognition){recognition.stop();recognition=null;document.querySelectorAll('.voice').forEach(x=>x.classList.remove('recording'));return}const area=document.querySelector(`[data-answer="${type}-${index}"]`);recognition=new SR();recognition.lang=document.getElementById('speechLang')?.value||'zh-CN';recognition.continuous=false;recognition.interimResults=true;let base=area.value.trim();btn.classList.add('recording');btn.textContent='■ 停止';recognition.onresult=e=>{let final='',interim='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;e.results[i].isFinal?final+=t:interim+=t}area.value=[base,final||interim].filter(Boolean).join(base?'\n':'');area.dispatchEvent(new Event('input'))};recognition.onend=()=>{btn.classList.remove('recording');btn.textContent='🎙 语音回答';recognition=null};recognition.onerror=()=>showToast('没有识别成功，请重试或使用系统听写');recognition.start()}
    function reportFor(i){const d=dayData[i],s=state[i]||{tasks:{},learnAnswers:[],interviewAnswers:[]};let totalDiff=0,filled=0;const taskLines=blocks.map(b=>{const t=(s.tasks||{})[b.id]||{},name=b.id==='platform'?d.platformLabel:b.name,has=t.actual!==''&&t.actual!==undefined&&t.actual!==null;if(has){totalDiff+=Number(t.actual)-b.planned;filled++}const dev=deviationInfo(t.actual,b.planned).text;return `- ${name}：${t.done?'已完成':'未完成'}；计划${plannedText(b.planned)}，实际${has?t.actual+'h':'未填'}；${dev}`}).join('\n');const total=filled?(totalDiff>0?'+':totalDiff<0?'−':'')+tidyNumber(Math.abs(totalDiff))+'h':'未计算';const answers=(arr,vals)=>arr.map((q,n)=>`${n+1}. ${q}\n回答：${(vals||[])[n]||'未回答'}`).join('\n\n');return `## ${d.date}｜${d.title}\n\n### 执行情况\n${taskLines}\n- 各任务计划偏差合计：${total}\n\n### 学习考察回答（即今日学习输出）\n${answers(d.learnQs,s.learnAnswers)}\n\n### 面试输出\n${d.interviewOutput}\n\n### 面试考察回答\n${answers(d.interviewQs,s.interviewAnswers)}\n\n### 执行记录\n- 执行中发现的问题：${s.problems||'未填'}\n- 待深入研究：${s.later||'未填'}\n- 今天的新判断：${s.thoughts||'未填'}\n- 实际用时偏差及原因：${s.timeReview||'未填'}\n\n### 评估要求\n请以甲方海外市场CMO视角评估我的商业理解、用户洞察、内容与转化逻辑、数据判断、表达、真实性和岗位潜力。先指出最关键的三处问题，再追问我，最后给出明天只需改进的一件事。`}
    async function copyText(text,msg){try{await navigator.clipboard.writeText(text);showToast(msg)}catch(e){const x=document.createElement('textarea');x.value=text;document.body.appendChild(x);x.select();document.execCommand('copy');x.remove();showToast(msg)}}
    function copyDay(){copyText(reportFor(active),'今天的完整看板已复制，直接粘贴给ChatGPT')}
    function copyWeek(){copyText(dayData.map((_,i)=>reportFor(i)).join('\n\n---\n\n'),'整周记录已复制')}
    function exportAll(){const blob=new Blob([JSON.stringify({version:5,exportedAt:new Date().toISOString(),state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='海外B2B学习看板记录备份.json';a.click();URL.revokeObjectURL(a.href);showToast('记录备份已导出')}
    function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2200)}
    render();
  </script>
</body>
